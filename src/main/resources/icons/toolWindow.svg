<svg width="13" height="13" viewBox="0 0 13 13" xmlns="http://www.w3.org/2000/svg">
    <!-- JetBrains compatible SVG icon for Vector Drawable Thumbnails -->
    <defs>
        <linearGradient id="vectorGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#6C7B7F;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#4A5568;stop-opacity:1" />
        </linearGradient>
    </defs>
    
    <!-- Background circle -->
    <circle cx="6.5" cy="6.5" r="6" fill="url(#vectorGradient)" stroke="#2D3748" stroke-width="0.5"/>
    
    <!-- Vector path icon -->
    <path d="M3.5 4.5 L6.5 2.5 L9.5 4.5 L8.5 7.5 L6.5 10.5 L4.5 7.5 Z" 
          fill="none" 
          stroke="#FFFFFF" 
          stroke-width="1.2" 
          stroke-linejoin="round" 
          stroke-linecap="round"/>
    
    <!-- Small thumbnail indicator -->
    <rect x="8.5" y="8.5" width="3" height="2.5" 
          fill="#FFFFFF" 
          stroke="#4A5568" 
          stroke-width="0.3" 
          rx="0.3"/>
    
    <!-- Thumbnail content lines -->
    <line x1="9" y1="9.2" x2="11" y2="9.2" stroke="#4A5568" stroke-width="0.2"/>
    <line x1="9" y1="9.8" x2="10.5" y2="9.8" stroke="#4A5568" stroke-width="0.2"/>
</svg> 